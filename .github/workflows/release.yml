# Publish to npm on tag push (v*): per-platform binary packages + the
# `@jgalbsss/agent-doctor` launcher package. Requires the NPM_TOKEN repo secret.
name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            npm: @jgalbsss/agent-doctor-darwin-arm64
            node_os: darwin
            node_arch: arm64
          - target: x86_64-apple-darwin
            os: macos-14
            npm: @jgalbsss/agent-doctor-darwin-x64
            node_os: darwin
            node_arch: x64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            npm: @jgalbsss/agent-doctor-linux-x64
            node_os: linux
            node_arch: x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            npm: @jgalbsss/agent-doctor-linux-arm64
            node_os: linux
            node_arch: arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            npm: @jgalbsss/agent-doctor-windows-x64
            node_os: win32
            node_arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release -p agent-doctor --target ${{ matrix.target }}
      - name: Assemble platform package
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG="npm-staging/${{ matrix.npm }}"
          mkdir -p "$PKG/bin"
          BIN=agent-doctor; [ "${{ matrix.node_os }}" = "win32" ] && BIN=agent-doctor.exe
          cp "target/${{ matrix.target }}/release/$BIN" "$PKG/bin/$BIN"
          cat > "$PKG/package.json" << EOF
          {
            "name": "${{ matrix.npm }}",
            "version": "$VERSION",
            "description": "agent-doctor binary for ${{ matrix.node_os }}-${{ matrix.node_arch }}",
            "license": "MIT",
            "repository": { "type": "git", "url": "git+https://github.com/JGalbss/agent-doctor.git" },
            "os": ["${{ matrix.node_os }}"],
            "cpu": ["${{ matrix.node_arch }}"],
            "files": ["bin"]
          }
          EOF
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Publish platform package
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if npm view "${{ matrix.npm }}@$VERSION" version > /dev/null 2>&1; then
            echo "${{ matrix.npm }}@$VERSION already published — skipping"
          else
            cd npm-staging/${{ matrix.npm }} && npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-launcher:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd npm/agent-doctor
          node -e "
            const fs = require('fs')
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'))
            pkg.version = '$VERSION'
            for (const dep of Object.keys(pkg.optionalDependencies)) {
              pkg.optionalDependencies[dep] = '$VERSION'
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n')
          "
      - name: Publish @jgalbsss/agent-doctor
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if npm view "@jgalbsss/agent-doctor@$VERSION" version > /dev/null 2>&1; then
            echo "@jgalbsss/agent-doctor@$VERSION already published — skipping"
          else
            cd npm/agent-doctor && npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
